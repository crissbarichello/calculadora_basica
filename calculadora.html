<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <script>
        function teste_unitario() {
            
            const operacoes = ["soma","subtracao","dividir","multiplicacao"];
            document.getElementById("num1").value = 15;
            document.getElementById("num2").value = 45;
            const li = document.createElement("li") ;
                        
            for (let i = 0; i <= 3; i++) {
                
                testev = calcular(operacoes[i])

                adicionar(testev,operacoes[i])
            }

            function adicionar(teste,operacao){
                const li = document.createElement("li") ;
                    li.textContent = "Resultado teste de "+operacao+" = "+ teste;
                    lista.appendChild(li); 
                    li.style = "color:green"
                return
            }
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("resultado").value = "";
        }

        
        function calcular(operador) {
            const num1 = parseFloat(document.getElementById("num1").value);
            const num2 = parseFloat(document.getElementById("num2").value);
            
            let resultadov;

            if (operador === 'soma') {
                resultadov = num1 + num2;
            } else if (operador === 'subtracao') {
                resultadov = num1 - num2;
            } else if (operador === 'dividir'){
                resultadov = num1 / num2;
            } else if (operador === 'multiplicacao'){
                resultadov = num1 * num2 ;
            } else{
                resultadov = "Operação inválida.";
            }

            document.getElementById("resultado").innerHTML = "Resultado: " + resultadov;
            
            return resultadov
        }

       
    </script>
</head>

<body>
    <table align="center" border="solid">
        <tr>
            <td>
                <h1>Calculadora</h1>
            </td>
        </tr>
        <tr>
            <td>
                <p>Insira os números e selecione a operação:</p>
            </td>
        </tr>
        <tr>
            <td>
                <input type="number" id="num1" placeholder="Número 1">
            </td>
        </tr>
        <tr>
            <td>
                <input type="number" id="num2" placeholder="Número 2">
            </td>
        </tr>
        <tr>
            <td>
                <button id="somar" onclick="calcular('soma')">Somar</button>
                <button id="subtrair" onclick="calcular('subtracao')">Subtrair</button>
                <button id="dividir" onclick="calcular('dividir')">Dividir</button>
                <button id="multiplicacao" onclick="calcular('multiplicacao')">Multiplicação</button>
            </td>                
        </tr>
        <tr>
            <td>
                <div id="resultado" ><p>Resultado aparecerá aqui.</p></div>
            </td>
        </tr>
        <tr>
            <td>
                <button id="teste" onclick="teste_unitario()">Teste</button>
                <ul id="lista"><p>Resultado do teste aparecerá aqui.</p></ul>
            </td>
        </tr>
        </div>
    </table>
</body>

</html>
